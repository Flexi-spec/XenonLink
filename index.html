<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XENONLINK | Ghost Protocol</title>
    <!-- Ably SDKs for Real-time Messaging -->
    <script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
    <script src="https://cdn.ably.com/lib/ably-chat.umd.cjs-0.js"></script>
    <style>
        :root { --accent: #00f2ff; --bg: #050505; --panel: #121212; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .window { width: 90%; max-width: 800px; height: 80vh; background: var(--panel); border: 1px solid #333; border-radius: 15px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 30px rgba(0,242,255,0.1); }
        #chat-view { display: none; flex-direction: column; height: 100%; }
        #msg-list { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 10px; max-width: 70%; font-size: 0.9rem; line-height: 1.4; }
        .sent { align-self: flex-end; background: var(--accent); color: #000; }
        .received { align-self: flex-start; background: #222; border: 1px solid #444; }
        .input-area { padding: 20px; border-top: 1px solid #333; display: flex; gap: 10px; }
        input { flex: 1; background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 8px; outline: none; }
        button { background: var(--accent); color: #000; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        /* Professional Lobby Styles */
        #lobby { padding: 40px; text-align: center; }
    </style>
</head>
<body>
    <div class="window">
        <!-- LOBBY: Link Generation -->
        <div id="lobby">
            <h1 style="letter-spacing: 5px; color: var(--accent);">XENONLINK</h1>
            <p>Generate a professional, one-time private chat link.</p>
            <button onclick="createLink()">Generate Secure Link</button>
            <div id="link-display" style="margin-top:20px; display:none;">
                <input type="text" id="link-url" readonly style="width:100%; text-align:center; color: var(--accent);">
                <p style="font-size:0.8rem; color:#888; margin-top:10px;">Link expires after the first person joins.</p>
                <button onclick="enterChat()" style="margin-top:10px;">Enter My Side</button>
            </div>
        </div>

        <!-- CHAT INTERFACE -->
        <div id="chat-view">
            <header style="padding:15px; border-bottom:1px solid #333; font-size:0.8rem; color:var(--accent);">Ghost Protocol Active</header>
            <div id="msg-list"></div>
            <div class="input-area">
                <input type="text" id="user-input" placeholder="Secure message..." onkeypress="if(event.key==='Enter') send()">
                <button onclick="send()">Send</button>
            </div>
        </div>
    </div>

    <script>
        const ABLY_KEY = '9zundg.NEZh_w:mwZaZiYQgTY72hVVCu1ia-D58vqNNpirS2S1p3R11UE'; // Get free at Ably.com
        let realtime, chatClient, room, myId = 'User-' + Math.floor(Math.random()*1000);

        function createLink() {
            const rid = 'XL-' + Math.random().toString(36).substr(2, 9);
            const link = window.location.href.split('?')[0] + '?room=' + rid;
            document.getElementById('link-url').value = link;
            document.getElementById('link-display').style.display = 'block';
            localStorage.setItem('isCreator', rid);
        }

        async function enterChat() {
            const urlParams = new URLSearchParams(window.location.search);
            const rid = urlParams.get('room') || document.getElementById('link-url').value.split('=')[1];

            // ONE-TIME LINK LOGIC: If not creator and already joined once, block
            if (!localStorage.getItem('isCreator') && sessionStorage.getItem('joined')) {
                alert("This private link has expired.");
                return;
            }
            sessionStorage.setItem('joined', 'true');

            // Initialize Ably Chat
            realtime = new Ably.Realtime({ key: ABLY_KEY, clientId: myId });
            chatClient = new AblyChat.ChatClient(realtime);
            room = await chatClient.rooms.get(rid);
            await room.attach();

            document.getElementById('lobby').style.display = 'none';
            document.getElementById('chat-view').style.display = 'flex';

            room.messages.subscribe((event) => {
                render(event.message.text, event.message.clientId === myId ? 'sent' : 'received');
            });
        }

        async function send() {
            const inp = document.getElementById('user-input');
            if(!inp.value) return;
            await room.messages.send({ text: inp.value });
            inp.value = '';
        }

        function render(txt, type) {
            const list = document.getElementById('msg-list');
            list.innerHTML += `<div class="msg ${type}">${txt}</div>`;
            list.scrollTop = list.scrollHeight;
        }

        if(window.location.search.includes('room=')) enterChat();
    </script>
</body>
</html>
