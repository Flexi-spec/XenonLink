<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XENONLINK | Ghost Workspace</title>
    <script src="https://cdn.ably.com"></script>
    <style>
        :root { --cyan: #00f2ff; --bg: #020617; --card: #0f172a; --danger: #ff4757; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Side Panel: Metadata & Stats */
        .sidebar { width: 280px; background: #010409; border-right: 1px solid #1e293b; padding: 20px; display: flex; flex-direction: column; }
        .stat-card { background: var(--card); padding: 10px; border-radius: 8px; font-size: 11px; margin-bottom: 10px; border: 1px solid #1e293b; }

        /* Main Chat: Professional & Clean */
        .chat-area { flex: 1; display: flex; flex-direction: column; position: relative; }
        header { padding: 15px 25px; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center; background: rgba(2,6,23,0.8); backdrop-filter: blur(10px); }
        
        #msg-list { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 15px; }
        .msg { position: relative; max-width: 65%; padding: 12px 16px; border-radius: 12px; font-size: 14px; group: hover; transition: 0.2s; }
        .msg-own { align-self: flex-end; background: var(--cyan); color: #000; font-weight: 500; }
        .msg-other { align-self: flex-start; background: var(--card); border: 1px solid #1e293b; }
        
        /* Message Controls: Update/Delete */
        .controls { position: absolute; top: -10px; right: 0; display: none; gap: 4px; }
        .msg:hover .controls { display: flex; }
        .btn-ctrl { font-size: 9px; background: #000; color: #fff; border: 1px solid #333; padding: 2px 6px; cursor: pointer; border-radius: 4px; }

        /* Input Bar */
        .input-bay { padding: 20px; background: var(--card); border-top: 1px solid #1e293b; display: flex; gap: 12px; }
        input { flex: 1; background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; outline: none; }
        button.send { background: var(--cyan); color: #000; border: none; padding: 10px 24px; border-radius: 8px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="font-size: 14px; color: var(--cyan); letter-spacing: 2px;">XENONLINK</h2>
        <div class="stat-card">STATUS: <span id="conn-status" style="color:var(--cyan)">Connecting...</span></div>
        <div class="stat-card">PRESENCE: <span id="online-count">0</span> Active Users</div>
        <div class="stat-card" style="margin-top:auto;">ROOM ID: <span id="room-id-tag">---</span></div>
        <button onclick="location.reload()" style="background:var(--danger); color:white; border:none; padding:10px; border-radius:8px; cursor:pointer;">EXIT & BURN ROOM</button>
    </div>

    <div class="chat-area">
        <header>
            <div id="typing-indicator" style="font-size: 12px; color: var(--cyan);"></div>
            <div style="font-size: 12px; opacity: 0.5;">Ghost Protocol v3.0</div>
        </header>

        <div id="msg-list"></div>

        <div class="input-bay">
            <input type="text" id="main-input" placeholder="Type your professional transmission..." oninput="handleTyping()">
            <button class="send" onclick="send()">TRANSMIT</button>
        </div>
    </div>

    <script>
        /* 
           ABLY PROFESSIONAL CONFIGURATION
           Capabilities included: publish, subscribe, presence, history, 
           message-update-own, message-delete-own, channel-metadata.
        */
        const ABLY_KEY = '9zundg.NEZh_w:mwZaZiYQgTY72hVVCu1ia-D58vqNNpirS2S1p3R11UE'; 
        let realtime, channel, myId = 'XL-' + Math.random().toString(36).substr(2, 5);

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const rid = urlParams.get('room');

            if (!rid) {
                const newRid = 'Room-' + Math.random().toString(36).substr(2, 8);
                window.history.pushState({}, '', '?room=' + newRid);
                location.reload();
                return;
            }

            // ONE-TIME LINK SECURITY: Block if already joined (non-creator)
            if (!localStorage.getItem('isCreator_' + rid) && sessionStorage.getItem('joined_' + rid)) {
                alert("ACCESS DENIED: Link deactivated.");
                return;
            }
            sessionStorage.setItem('joined_' + rid, 'true');
            document.getElementById('room-id-tag').innerText = rid;

            realtime = new Ably.Realtime({ key: ABLY_KEY, clientId: myId });
            channel = realtime.channels.get(rid, { params: { rewind: '20' } }); // LOAD HISTORY

            // 1. CONNECTION STATUS
            realtime.connection.on('connected', () => document.getElementById('conn-status').innerText = 'SECURE');

            // 2. PRESENCE: Track online users
            channel.presence.subscribe(() => {
                channel.presence.get((err, members) => {
                    document.getElementById('online-count').innerText = members.length;
                });
            });
            channel.presence.enter();

            // 3. MESSAGE & UPDATE/DELETE SUBSCRIPTION
            channel.subscribe('chat', (m) => {
                if (m.data.action === 'delete') {
                    document.getElementById(m.data.targetId)?.remove();
                } else if (m.data.action === 'update') {
                    const el = document.getElementById(m.data.targetId);
                    if (el) el.querySelector('.txt').innerText = m.data.newText + " (edited)";
                } else {
                    render(m);
                }
            });

            // 4. TYPING METADATA
            channel.subscribe('typing', (m) => {
                if (m.clientId !== myId) {
                    document.getElementById('typing-indicator').innerText = 'Guest is typing...';
                    setTimeout(() => document.getElementById('typing-indicator').innerText = '', 2000);
                }
            });
        }

        function send() {
            const val = document.getElementById('main-input').value;
            if (!val) return;
            const msgId = 'm-' + Date.now();
            channel.publish('chat', { text: val, id: msgId });
            document.getElementById('main-input').value = '';
        }

        // 5. UPDATE & DELETE OWN MESSAGES
        function editMsg(id) {
            const newText = prompt("Edit message:");
            if (newText) channel.publish('chat', { action: 'update', targetId: id, newText });
        }

        function delMsg(id) {
            if (confirm("Delete forever?")) channel.publish('chat', { action: 'delete', targetId: id });
        }

        function render(m) {
            const isOwn = m.clientId === myId;
            const list = document.getElementById('msg-list');
            const div = document.createElement('div');
            div.id = m.data.id;
            div.className = `msg ${isOwn ? 'msg-own' : 'msg-other'}`;
            div.innerHTML = `
                <div class="txt">${m.data.text}</div>
                ${isOwn ? `<div class="controls">
                    <button class="btn-ctrl" onclick="editMsg('${m.data.id}')">Edit</button>
                    <button class="btn-ctrl" onclick="delMsg('${m.data.id}')">X</button>
                </div>` : ''}
            `;
            list.appendChild(div);
            list.scrollTop = list.scrollHeight;
        }

        let t; function handleTyping() { channel.publish('typing', {}); }

        init();
    </script>
</body>
</html>
